name: Publish to npm

# Trusted Publishing (OIDC) — no npm token / OTP needed. npm verifies the GitHub
# Actions identity directly. Requires a Trusted Publisher configured for this package
# on npmjs.com (Settings -> Trusted Publisher -> GitHub Actions) matching this repo +
# workflow filename. Publishes the version currently in package.json.
on:
  release:
    types: [published] # auto-publish when a GitHub Release is published
  workflow_dispatch: {} # allow manual runs from the Actions tab / gh CLI

permissions:
  contents: read
  id-token: write # REQUIRED for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: npm ci
      - name: Publish (OIDC trusted publishing, with provenance)
        run: npm publish --provenance --access public
